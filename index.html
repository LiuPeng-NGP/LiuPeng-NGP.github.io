<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liu Peng</title>
    
    <!-- Load zero-md -->
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
    
    <style>
        body {
            margin: 0;
            background: #fff;
        }
    </style>
</head>
<body>

    <!-- src="README.md" loads your content -->
    <zero-md src="README.md">
        <template>
            <style>
                :host {
                    display: block;
                    max-width: 740px;
                    margin: 48px auto;
                    padding: 0 24px 56px;
                    color: #222;
                    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
                    line-height: 1.58;
                }

                h1, h2, h3 {
                    color: #111;
                    font-family: inherit;
                    letter-spacing: 0;
                }

                h1 {
                    margin: 0 0 0.75rem;
                    font-size: 2rem;
                    font-weight: 650;
                    line-height: 1.2;
                }

                h3 {
                    margin: 2.1rem 0 0.75rem;
                    padding-bottom: 0.35rem;
                    border-bottom: 1px solid #e8e8e8;
                    font-size: 1.05rem;
                    font-weight: 650;
                }

                img[src*="portrait"] {
                    float: right;
                    width: 150px;
                    height: auto;
                    margin: 0 0 20px 32px;
                    border-radius: 4px;
                    object-fit: cover;
                }

                a {
                    color: #0645ad;
                    text-decoration: none;
                }

                a:hover {
                    text-decoration: underline;
                }

                p {
                    margin: 0.75rem 0;
                }

                strong {
                    color: #000;
                    font-weight: 600;
                }

                hr {
                    clear: both;
                    margin: 2rem 0 0;
                    border: 0;
                    border-top: 1px solid #e8e8e8;
                }

                ul {
                    margin: 0.5rem 0 1.5rem;
                    padding-left: 1.2rem;
                }

                li {
                    margin-bottom: 0.6rem;
                }

                @media (max-width: 600px) {
                    :host {
                        margin: 24px auto;
                        padding: 0 20px 40px;
                    }

                    h1 {
                        font-size: 1.8rem;
                    }

                    img[src*="portrait"] {
                        float: none;
                        display: block;
                        width: 132px;
                        margin: 0 0 18px;
                    }
                }
            </style>
        </template>
    </zero-md>

</body>
</html>
